<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Кібербезпека від Майстра Йоди</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Crimson+Pro:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green: #4ade80;
    --green-glow: rgba(74, 222, 128, 0.6);
    --text: #d1fae5;
    --gold: #fbbf24;
  }

  body, html {
    height: 100%;
    font-family: 'Crimson Pro', Georgia, serif;
    background-color: #050d08;
    color: var(--text);
    overflow: hidden;
  }

  body::before {
    content: '';
    position: absolute;
    inset: 0;
    /* УВАГА: Замініть yoda-bg.jpg на шлях до вашої картинки */
    background-image: 
      linear-gradient(rgba(5, 13, 8, 0.4), rgba(5, 13, 8, 0.85)),
      url('./yoda-bg.jpg'); 
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    z-index: -1;
    filter: contrast(1.1) brightness(0.8);
  }

  .app-container {
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    align-items: center;
    height: 100%;
    padding: 30px 20px;
    position: relative;
  }

  /* --- Хедер --- */
  .header-text {
    font-family: 'Cinzel Decorative', serif;
    font-size: 11px;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: var(--green);
    text-shadow: 0 0 10px var(--green-glow);
    text-align: center;
    margin-top: 10px;
  }

  /* --- Гамбургер меню --- */
  .menu-btn {
    position: absolute;
    top: 30px;
    right: 30px;
    background: transparent;
    border: none;
    cursor: pointer;
    z-index: 100;
    display: flex;
    flex-direction: column;
    gap: 6px;
    padding: 10px;
  }

  .menu-btn div {
    width: 30px;
    height: 2px;
    background-color: var(--green);
    box-shadow: 0 0 8px var(--green-glow);
    transition: 0.3s;
  }

  .menu-overlay {
    position: absolute;
    inset: 0;
    background: rgba(5, 13, 8, 0.95);
    backdrop-filter: blur(10px);
    z-index: 90;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 20px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s ease;
  }

  .menu-overlay.open {
    opacity: 1;
    pointer-events: all;
  }

  .cat-btn {
    background: transparent;
    border: none;
    color: #888;
    font-size: 22px;
    font-family: 'Crimson Pro', serif;
    cursor: pointer;
    transition: color 0.3s, transform 0.3s;
    text-transform: uppercase;
    letter-spacing: 2px;
  }

  .cat-btn:hover, .cat-btn.active {
    color: var(--green);
    text-shadow: 0 0 15px var(--green-glow);
    transform: scale(1.1);
  }

  /* --- Головна зона --- */
  .content-area {
    flex-grow: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    max-width: 800px;
    width: 100%;
    text-align: center;
    cursor: pointer;
    padding: 20px;
    user-select: none;
  }

  .quote {
    font-size: clamp(26px, 5vw, 42px);
    font-style: italic;
    font-weight: 300;
    line-height: 1.4;
    text-shadow: 0 4px 20px rgba(0,0,0,0.8);
    transition: opacity 0.5s ease, transform 0.5s ease;
    min-height: 80px;
  }

  .quote.fade-out {
    opacity: 0;
    transform: scale(0.95);
  }

  /* Курсор друку */
  .cursor {
    display: inline-block;
    width: clamp(10px, 2vw, 15px);
    height: 1em;
    background-color: var(--green);
    vertical-align: middle;
    margin-left: 5px;
    box-shadow: 0 0 10px var(--green-glow);
    animation: blink 1s step-end infinite;
    font-style: normal;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }

  .tip-box {
    margin-top: 30px;
    max-height: 0;
    opacity: 0;
    overflow: hidden;
    transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    background: rgba(251, 191, 36, 0.1);
    border-left: 3px solid var(--gold);
    padding: 0 20px;
    transform: translateY(-20px);
  }

  .tip-box.visible {
    max-height: 300px;
    opacity: 1;
    padding: 20px;
    transform: translateY(0);
  }

  .tip-label {
    font-family: 'Cinzel Decorative', serif;
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .tip-text {
    font-size: clamp(16px, 3vw, 20px);
    line-height: 1.5;
    color: #fef3c7;
  }

  .click-hint {
    margin-top: 15px;
    font-size: 12px;
    color: rgba(255,255,255,0.4);
    letter-spacing: 2px;
    text-transform: uppercase;
    animation: pulse 2s infinite;
    opacity: 0; /* Приховано за замовчуванням */
    transition: opacity 0.3s;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 0.8; }
  }

  /* --- Світловий меч --- */
  .saber-wrapper {
    margin-bottom: 20px;
    padding: 20px;
    cursor: pointer;
  }

  .lightsaber {
    display: flex;
    align-items: center;
    width: 280px;
    height: 14px;
    transition: transform 0.1s;
  }

  .saber-wrapper:active .lightsaber { transform: scale(0.95); }

  .hilt {
    width: 70px;
    height: 16px;
    background: linear-gradient(to bottom, #777 0%, #ddd 30%, #444 70%, #222 100%);
    border-radius: 3px 0 0 3px;
    position: relative;
    box-shadow: inset -2px 0 5px rgba(0,0,0,0.5);
  }

  .hilt::after {
    content: ''; position: absolute; right: 5px; top: -2px; bottom: -2px; width: 8px;
    background: #111; border-radius: 1px;
  }
  .hilt::before {
    content: ''; position: absolute; left: 10px; top: 0; bottom: 0; width: 20px;
    background: repeating-linear-gradient(90deg, #222, #222 2px, #555 2px, #555 4px);
  }

  .blade {
    flex-grow: 1;
    height: 10px;
    background: #fff;
    border-radius: 0 5px 5px 0;
    box-shadow: 0 0 10px #fff, 0 0 20px var(--green), 0 0 40px var(--green), 0 0 60px var(--green);
    transform-origin: left center;
    transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }

  .lightsaber.action .blade {
    transform: scaleX(0);
    transition: transform 0.1s;
  }

  /* --- Футер --- */
  .footer-text {
    font-family: 'Cinzel Decorative', serif;
    font-size: 10px;
    letter-spacing: 2px;
    color: rgba(255,255,255,0.3);
    text-align: center;
  }

  @media (max-width: 600px) { .menu-btn { top: 20px; right: 20px; } }
</style>
</head>
<body>

<div class="app-container">
  
  <button class="menu-btn" onclick="toggleMenu()" aria-label="Меню">
    <div></div><div></div><div></div>
  </button>

  <div class="menu-overlay" id="menuOverlay">
    <button class="cat-btn active" data-cat="all" onclick="selectCat(this)">Всі мудрості</button>
    <button class="cat-btn" data-cat="passwords" onclick="selectCat(this)">Паролі</button>
    <button class="cat-btn" data-cat="social" onclick="selectCat(this)">Соцмережі</button>
    <button class="cat-btn" data-cat="devices" onclick="selectCat(this)">Пристрої</button>
    <button class="cat-btn" data-cat="backups" onclick="selectCat(this)">Бекапи</button>
    <button class="cat-btn" data-cat="phishing" onclick="selectCat(this)">Фішинг</button>
    <button class="cat-btn" data-cat="pro" onclick="selectCat(this)">Для профі</button>
  </div>

  <div class="header-text">Галактична академія кіберзахисту</div>

  <!-- Центральна зона -->
  <div class="content-area" onclick="handleContentClick()">
    <div class="quote" id="quoteText">
      <span id="typedText"></span><span class="cursor" id="typeCursor" style="display:none;"></span>
    </div>
    <div class="click-hint" id="clickHint">Натисни, щоб відкрити пораду</div>
    
    <div class="tip-box" id="tipBox">
      <div class="tip-label">⚡ Практична порада</div>
      <div class="tip-text" id="tipText">Налаштовую генератор...</div>
    </div>
  </div>

  <div class="saber-wrapper" onclick="generateWisdom()">
    <div class="lightsaber" id="lightsaber">
      <div class="hilt"></div>
      <div class="blade"></div>
    </div>
  </div>

  <div class="footer-text">✦ Хай буде з тобою Сила (і двофакторна автентифікація) ✦</div>

</div>

<script>
const QUOTES_DB =[
  { cat: 'passwords', quote: 'Пароль короткий – мов меч без леза. Захистити тебе він не зможе.', tip: 'Використовуй парольні фрази (passphrases) з 4-5 випадкових слів. Їх легко запам\'ятати, але надзвичайно важко підібрати хакерам.' },
  { cat: 'passwords', quote: 'На папірці пароль записав? Ворогу ключі від дому віддав, ти.', tip: 'Встанови менеджер паролів (наприклад, Bitwarden або 1Password) та захисти його одним потужним майстер-паролем.' },
  { cat: 'passwords', quote: 'Один пароль для всього — шлях на темний бік це є.', tip: 'Кожен сервіс має мати унікальний пароль. Якщо шахраї зламають один слабозахищений сайт, інші твої акаунти залишаться в безпеці.' },
  { cat: 'passwords', quote: 'Два фактори краще, ніж один. Силу твою подвоює цей захист.', tip: 'Всюди налаштуй двофакторну автентифікацію (2FA). Найкраще — через додатки типу Google Authenticator, Authy або ключі YubiKey.' },
  { cat: 'social', quote: 'Думками ділишся відкрито? Ворожа розвідка вдячна тобі дуже буде.', tip: 'Ніколи не публікуй фото військової техніки, результати прильотів чи своє точне місцезнаходження. Вимкни геолокацію в налаштуваннях камери.' },
  { cat: 'social', quote: 'Тести розважальні проходиш? Душу свою маркетологам і шахраям продаєш.', tip: 'Уникай ігор формату "Яка ти квітка" у Facebook. Вони збирають твої персональні дані, контакти та аналізують фотографії.' },
  { cat: 'social', quote: 'Незнайомця у друзі прийняв — троянського коня в свій дім пустив.', tip: 'Фейкові акаунти (боти) часто маскуються під красивих людей або волонтерів для збору інформації (OSINT). Перевіряй профілі.' },
  { cat: 'devices', quote: 'Екран не заблокував — таємниці свої всьому світу подарував.', tip: 'Налаштуй автоблокування екрану смартфона та ПК через 30-60 секунд неактивності. Використовуй біометрію та складний PIN-код.' },
  { cat: 'devices', quote: 'Без оновлень система твоя — як броня дірява в бою.', tip: 'Завжди вмикай автоматичні оновлення операційної системи та додатків. Розробники постійно закривають знайдені "дірки" (вразливості).' },
  { cat: 'devices', quote: 'Безкоштовний Wi-Fi манить тебе? Темного боку пастка це.', tip: 'У публічних мережах (кафе, метро) завжди вмикай надійний VPN. Ніколи не здійснюй банківські операції через відкритий Wi-Fi.' },
  { cat: 'backups', quote: 'Сьогодні дані є, завтра немає. Лише бекап рівновагу збереже.', tip: 'Застосовуй золоте правило 3-2-1: 3 копії важливих даних, на 2 різних типах носіїв, 1 з яких зберігається поза домом (в хмарі).' },
  { cat: 'backups', quote: 'Зробив копію, але не перевірив? Ілюзією безпеки тішиш себе ти.', tip: 'Створити бекап — лише половина справи. Регулярно пробуй відновити випадковий файл, щоб переконатися, що архів не пошкоджено.' },
  { cat: 'phishing', quote: 'Гроші дарма обіцяють? Страх або жадібність твою використати хочуть.', tip: 'Офіційні виплати оформлюються лише через додаток Дія. Ніколи не переходь за сумнівними посиланнями в SMS чи Telegram.' },
  { cat: 'phishing', quote: 'Від керівника повідомлення дивне прийшло? Голосом його перевір, юний падаване.', tip: 'Якщо знайомий чи начальник терміново просить позичити гроші або скинути паролі в месенджері — зателефонуй йому! Це може бути злам.' },
  { cat: 'phishing', quote: 'Адресу сайту не перевірив — пароль свій ворогу власноруч віддав.', tip: 'Звертай увагу на URL-адресу. Фішингові сайти часто змінюють одну літеру (наприклад, faecbook замість facebook).' },
  { cat: 'pro', quote: 'Права адміністратора для щоденних справ? Хаос у системі посієш швидко.', tip: 'Дотримуйся принципу найменших привілеїв (PoLP). Надавай користувачам і сервісам лише ті права, які мінімально необхідні.' },
  { cat: 'pro', quote: 'Довіряй, але перевіряй? Ні. Не довіряй нікому, перевіряй кожного.', tip: 'Впроваджуй архітектуру Zero Trust. Жоден пристрій чи користувач не вважається безпечним за замовчуванням.' },
  { cat: 'pro', quote: 'Логи не читаєш — у темряві із зав\'язаними очима б\'єшся.', tip: 'Налаштуй централізований збір логів (SIEM) та автоматичні алерти на аномалії. Виявлення інциденту на ранній стадії — ключ до порятунку.' },
  // ПАРОЛІ ТА АВТЕНТИФІКАЦІЯ
  { cat: 'passwords', quote: 'Ключ один від усіх дверей ти зробив? Радіє крадій, що старатися йому не треба.', tip: 'Використовуй унікальні паролі для кожної пошти та сервісу. Злам одного сайту не повинен означати втрату всього твого цифрового життя.' },
  { cat: 'passwords', quote: 'Палець твій та обличчя — паролі найкращі. Їх хакер не вгадає ніколи.', tip: 'Увімкни біометричну авторизацію (TouchID, FaceID) на смартфоні та в банківських додатках. Це швидше і набагато надійніше за звичайний пін-код.' },
  { cat: 'passwords', quote: 'Змінювати пароль щомісяця — марна трата Сили це. Краще один, але міцний як мандалорська сталь, створи.', tip: 'Немає сенсу регулярно змінювати паролі, якщо вони слабкі. Зроби одну довгу унікальну фразу і змінюй лише якщо підозрюєш злам бази даних сервісу.' },
  
  // СОЦМЕРЕЖІ ТА OSINT
  { cat: 'social', quote: 'Емоціям піддався від новини гучної? Точно ІПСО вороже перед тобою.', tip: 'Ворог використовує клікбейт, "зраду" та емоційні заголовки для поширення паніки. Перевіряй інформацію лише в офіційних джерелах (Генштаб, СБУ, Центр протидії дезінформації).' },
  { cat: 'social', quote: 'Стіни дому твого прозорими бути не повинні. Сторінку свою від чужих очей закрий.', tip: 'Зроби свої профілі в соцмережах (Instagram, Facebook) приватними. Не давай ворожим OSINT-фахівцям зайвої інформації про себе, родину та місцевість.' },
  { cat: 'social', quote: 'Номер свій у Телеграмі ховати мусиш. Інакше темні сили швидко тебе знайдуть.', tip: 'В налаштуваннях конфіденційності Telegram обов\'язково скрий свій номер телефону від усіх. Також заборони пошук свого акаунту за номером телефону.' },

  // БЕЗПЕКА ПРИСТРОЇВ

  { cat: 'phishing', quote: 'Приз великий ти виграв, хоч у лотерею не грав? Пасткою сиру безкоштовного це виявиться.', tip: 'Ігноруй повідомлення в месенджерах про раптові виграші, посилки від пошти, які не замовляв, або надприбуткові інвестиції. Це класичний фішинг.' },

  // ДЛЯ ПРОФІ
  { cat: 'pro', quote: 'По паролю до сервера підключаєшся досі? Ключі SSH шлях джедая справжнього відкриють тобі.', tip: 'Вимкни авторизацію за паролем (PasswordAuthentication no в sshd_config) та використовуй виключно криптографічні SSH-ключі (Ed25519) для доступу до інфраструктури.' },
  { cat: 'pro', quote: 'Пакет з інтернету невідомий встановив? Бекдор у свій проєкт ти запросив.', tip: 'Перевіряй open-source залежності на вразливості (через npm audit, snyk) та будь обережним із typosquatting (навмисною підробкою назв популярних бібліотек).' },
  { cat: 'pro', quote: 'План на випадок зламу лише в голові тримаєш? Коли атака прийде, забудеш усе ти.', tip: 'Майте задокументований Incident Response Plan (план реагування на інциденти). Регулярно проводьте навчання команди з кібербезпеки (Tabletop exercises).' }
];

let selectedCat = 'all';
let lastQuoteIndex = -1;
let isAnimating = false;
let isMenuOpen = false;

// Змінні для "друкарської машинки"
let typeTimeout;
let isTyping = false;
let currentFullText = "";

function toggleMenu() {
  const menu = document.getElementById('menuOverlay');
  isMenuOpen = !isMenuOpen;
  menu.classList.toggle('open');
}

function selectCat(el) {
  document.querySelectorAll('.cat-btn').forEach(btn => btn.classList.remove('active'));
  el.classList.add('active');
  selectedCat = el.dataset.cat;
  toggleMenu();
  setTimeout(generateWisdom, 300);
}

// Логіка кліку по тексту: або пропускаємо друк, або відкриваємо пораду
function handleContentClick() {
  if (isTyping) {
    // Якщо текст ще друкується — показуємо його миттєво повністю
    finishTypingInstantly();
  } else {
    // Якщо текст уже надруковано — відкриваємо пораду
    toggleTip();
  }
}

function finishTypingInstantly() {
  clearTimeout(typeTimeout);
  isTyping = false;
  document.getElementById('typedText').textContent = currentFullText;
  document.getElementById('typeCursor').style.display = 'none';
  document.getElementById('clickHint').style.opacity = '1';
}

function toggleTip() {
  // Не дозволяємо відкривати пораду, якщо текст не завантажився
  if(!currentFullText || isTyping) return; 

  const tipBox = document.getElementById('tipBox');
  const hint = document.getElementById('clickHint');
  
  tipBox.classList.toggle('visible');
  
  if(tipBox.classList.contains('visible')) {
    hint.style.opacity = '0';
  } else {
    hint.style.opacity = '1';
  }
}

function typeWriter(text) {
  isTyping = true;
  currentFullText = text;
  
  const textSpan = document.getElementById('typedText');
  const cursorSpan = document.getElementById('typeCursor');
  
  textSpan.textContent = '';
  cursorSpan.style.display = 'inline-block';
  
  let i = 0;
  // Базова швидкість друку (чим менше - тим швидше)
  const baseSpeed = 40; 

  function typeNextChar() {
    if (i < text.length) {
      let char = text.charAt(i);
      textSpan.textContent += char;
      i++;
      
      let currentSpeed = baseSpeed + (Math.random() * 20); // Трохи рандому для "живого" ефекту
      
      // Майстер Йода робить паузи на розділових знаках
      if (['.', ',', '?', '!', '–', '—'].includes(char)) {
        currentSpeed += 250; 
      }
      
      typeTimeout = setTimeout(typeNextChar, currentSpeed);
    } else {
      // Друк завершено природним шляхом
      isTyping = false;
      cursorSpan.style.display = 'none';
      document.getElementById('clickHint').style.opacity = '1';
    }
  }
  
  typeNextChar();
}

function generateWisdom() {
  if(isAnimating) return;
  isAnimating = true;

  // Зупиняємо попередній текст, якщо він ще друкувався
  clearTimeout(typeTimeout);
  isTyping = false;

  const saber = document.getElementById('lightsaber');
  saber.classList.add('action');

  const pool = selectedCat === 'all' ? QUOTES_DB : QUOTES_DB.filter(i => i.cat === selectedCat);
  let randomIndex;
  if (pool.length > 1) {
    do { randomIndex = Math.floor(Math.random() * pool.length); } 
    while (pool[randomIndex].quote === (QUOTES_DB[lastQuoteIndex] ? QUOTES_DB[lastQuoteIndex].quote : ''));
  } else {
    randomIndex = 0;
  }
  
  const selectedItem = pool[randomIndex];
  lastQuoteIndex = QUOTES_DB.indexOf(selectedItem);

  const qEl = document.getElementById('quoteText');
  const tBox = document.getElementById('tipBox');
  const hint = document.getElementById('clickHint');
  
  qEl.classList.add('fade-out');
  tBox.classList.remove('visible');
  hint.style.opacity = '0';

  setTimeout(() => {
    // Встановлюємо текст поради
    document.getElementById('tipText').textContent = selectedItem.tip;
    
    // Очищуємо і повертаємо блок тексту
    qEl.classList.remove('fade-out');
    document.getElementById('typedText').textContent = '';
    document.getElementById('typeCursor').style.display = 'none';
    
    saber.classList.remove('action');
    
    // Запускаємо ефект друкарської машинки
    typeWriter('\u00ab' + selectedItem.quote + '\u00bb');
    
    setTimeout(() => { isAnimating = false; }, 400);
  }, 400);
}

// Перший запуск
window.addEventListener('load', generateWisdom);
</script>

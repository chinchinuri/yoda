<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Кібербезпека від Майстра Йоди</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Crimson+Pro:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green: #4ade80;
    --green-glow: rgba(74, 222, 128, 0.6);
    --text: #d1fae5;
    --gold: #fbbf24;
  }

  body, html {
    height: 100%;
    font-family: 'Crimson Pro', Georgia, serif;
    background-color: #050d08;
    color: var(--text);
    overflow: hidden;
  }

  body {
  background-image: 
    linear-gradient(rgba(5, 13, 8, 0.4), rgba(5, 13, 8, 0.85)),
    url('./Yoda-Retina_2a7ecc26.jpeg');

    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
  }

  .app-container {
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    align-items: center;
    height: 100%;
    padding: 30px 20px;
    position: relative;
  }

  /* --- Хедер --- */
  .header-text {
    font-family: 'Cinzel Decorative', serif;
    font-size: 11px;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: var(--green);
    text-shadow: 0 0 10px var(--green-glow);
    text-align: center;
    margin-top: 10px;
  }

  /* --- Гамбургер меню --- */
  .menu-btn {
    position: absolute;
    top: 30px;
    right: 30px;
    background: transparent;
    border: none;
    cursor: pointer;
    z-index: 100;
    display: flex;
    flex-direction: column;
    gap: 6px;
    padding: 10px;
  }

  .menu-btn div {
    width: 30px;
    height: 2px;
    background-color: var(--green);
    box-shadow: 0 0 8px var(--green-glow);
    transition: 0.3s;
  }

  .menu-overlay {
    position: absolute;
    inset: 0;
    background: rgba(5, 13, 8, 0.95);
    backdrop-filter: blur(10px);
    z-index: 90;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 20px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s ease;
  }

  .menu-overlay.open {
    opacity: 1;
    pointer-events: all;
  }

  .cat-btn {
    background: transparent;
    border: none;
    color: #888;
    font-size: 22px;
    font-family: 'Crimson Pro', serif;
    cursor: pointer;
    transition: color 0.3s, transform 0.3s;
    text-transform: uppercase;
    letter-spacing: 2px;
  }

  .cat-btn:hover, .cat-btn.active {
    color: var(--green);
    text-shadow: 0 0 15px var(--green-glow);
    transform: scale(1.1);
  }

  /* --- Головна зона --- */
  .content-area {
    flex-grow: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    max-width: 800px;
    width: 100%;
    text-align: center;
    cursor: pointer;
    padding: 20px;
    user-select: none;
  }

  .quote {
    font-size: clamp(26px, 5vw, 42px);
    font-style: italic;
    font-weight: 300;
    line-height: 1.4;
    text-shadow: 0 4px 20px rgba(0,0,0,0.8);
    transition: opacity 0.5s ease, transform 0.5s ease;
    min-height: 80px;
  }

  .quote.fade-out {
    opacity: 0;
    transform: scale(0.95);
  }

  /* Курсор друку */
  .cursor {
    display: inline-block;
    width: clamp(10px, 2vw, 15px);
    height: 1em;
    background-color: var(--green);
    vertical-align: middle;
    margin-left: 5px;
    box-shadow: 0 0 10px var(--green-glow);
    animation: blink 1s step-end infinite;
    font-style: normal;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }

  .tip-box {
    margin-top: 30px;
    max-height: 0;
    opacity: 0;
    overflow: hidden;
    transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    background: rgba(251, 191, 36, 0.1);
    border-left: 3px solid var(--gold);
    padding: 0 20px;
    transform: translateY(-20px);
  }

  .tip-box.visible {
    max-height: 300px;
    opacity: 1;
    padding: 20px;
    transform: translateY(0);
  }

  .tip-label {
    font-family: 'Cinzel Decorative', serif;
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .tip-text {
    font-size: clamp(16px, 3vw, 20px);
    line-height: 1.5;
    color: #fef3c7;
  }

  .click-hint {
    margin-top: 15px;
    font-size: 12px;
    color: rgba(255,255,255,0.4);
    letter-spacing: 2px;
    text-transform: uppercase;
    animation: pulse 2s infinite;
    opacity: 0; /* Приховано за замовчуванням */
    transition: opacity 0.3s;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 0.8; }
  }

  /* --- Світловий меч --- */
  .saber-wrapper {
    margin-bottom: 20px;
    padding: 20px;
    cursor: pointer;
  }

  .lightsaber {
    display: flex;
    align-items: center;
    width: 280px;
    height: 14px;
    transition: transform 0.1s;
  }

  .saber-wrapper:active .lightsaber { transform: scale(0.95); }

  .hilt {
    width: 70px;
    height: 16px;
    background: linear-gradient(to bottom, #777 0%, #ddd 30%, #444 70%, #222 100%);
    border-radius: 3px 0 0 3px;
    position: relative;
    box-shadow: inset -2px 0 5px rgba(0,0,0,0.5);
  }

  .hilt::after {
    content: ''; position: absolute; right: 5px; top: -2px; bottom: -2px; width: 8px;
    background: #111; border-radius: 1px;
  }
  .hilt::before {
    content: ''; position: absolute; left: 10px; top: 0; bottom: 0; width: 20px;
    background: repeating-linear-gradient(90deg, #222, #222 2px, #555 2px, #555 4px);
  }

  .blade {
    flex-grow: 1;
    height: 10px;
    background: #fff;
    border-radius: 0 5px 5px 0;
    box-shadow: 0 0 10px #fff, 0 0 20px var(--green), 0 0 40px var(--green), 0 0 60px var(--green);
    transform-origin: left center;
    transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }

  .lightsaber.action .blade {
    transform: scaleX(0);
    transition: transform 0.1s;
  }

  /* --- Футер --- */
  .footer-text {
    font-family: 'Cinzel Decorative', serif;
    font-size: 10px;
    letter-spacing: 2px;
    color: rgba(255,255,255,0.3);
    text-align: center;
  }

  @media (max-width: 600px) { .menu-btn { top: 20px; right: 20px; } }
</style>
</head>
<body>

<div class="app-container">
  
  <button class="menu-btn" onclick="toggleMenu()" aria-label="Меню">
    <div></div><div></div><div></div>
  </button>

  <div class="menu-overlay" id="menuOverlay">
    <button class="cat-btn active" data-cat="all" onclick="selectCat(this)">Всі мудрості</button>
    <button class="cat-btn" data-cat="passwords" onclick="selectCat(this)">Паролі</button>
    <button class="cat-btn" data-cat="social" onclick="selectCat(this)">Соцмережі</button>
    <button class="cat-btn" data-cat="devices" onclick="selectCat(this)">Пристрої</button>
    <button class="cat-btn" data-cat="backups" onclick="selectCat(this)">Бекапи</button>
    <button class="cat-btn" data-cat="phishing" onclick="selectCat(this)">Фішинг</button>
    <button class="cat-btn" data-cat="pro" onclick="selectCat(this)">Для профі</button>
  </div>

  <div class="header-text">Галактична академія кіберзахисту</div>

  <!-- Центральна зона -->
  <div class="content-area" onclick="handleContentClick()">
    <div class="quote" id="quoteText">
      <span id="typedText"></span><span class="cursor" id="typeCursor" style="display:none;"></span>
    </div>
    <div class="click-hint" id="clickHint">Натисни, щоб відкрити пораду</div>
    
    <div class="tip-box" id="tipBox">
      <div class="tip-label">⚡ Практична порада</div>
      <div class="tip-text" id="tipText">Налаштовую генератор...</div>
    </div>
  </div>

  <div class="saber-wrapper" onclick="generateWisdom()">
    <div class="lightsaber" id="lightsaber">
      <div class="hilt"></div>
      <div class="blade"></div>
    </div>
  </div>

  <div class="footer-text">✦ Хай буде з тобою Сила (і двофакторна автентифікація) ✦</div>

</div>

<script>

  { cat: 'passwords', quote: 'На папірці пароль записав? Ворогу ключі від дому віддав, ти.', tip: 'Встанови менеджер паролів (Bitwarden, 1Password) та захисти його одним потужним майстер-паролем.' },

  { cat: 'passwords', quote: 'Два фактори краще, ніж один. Силу твою подвоює цей захист.', tip: 'Всюди налаштуй двофакторну автентифікацію (2FA). Найкраще — через додатки типу Google Authenticator, а не через SMS.' },

  { cat: 'passwords', quote: 'Браузеру паролі свої довіряєш? В небезпеці таємниці твої.', tip: 'Вбудовані в браузер менеджери паролів легко зламати вірусами-стілерами. Використовуй окремі зашифровані програми.' },

  { cat: 'passwords', quote: 'qwerty на клавіатурі набрав? Запрошення для ситхів це.', tip: 'Найпопулярніші паролі (123456, qwerty, admin) боти підбирають за частку секунди. Перевір свій пароль на сайті haveibeenpwned.' },

let selectedCat = 'all';
let lastQuoteIndex = -1;
let isAnimating = false;
let isMenuOpen = false;

// Змінні для "друкарської машинки"
let typeTimeout;
let isTyping = false;
let currentFullText = "";

// Звук меча (Впевніться, що файл saber.mp3 лежить поруч)
const igniteSound = new Audio('./saber.mp3');
igniteSound.volume = 0.5;

// Фрази-ілюзії роботи ШІ
const connectionPhrases = [
  "[ Встановлення зв'язку з архівами Ордену... ]",
  "[ Синхронізація з датападом Галактичної Республіки... ]",
  "[ Аналіз поточних кіберзагроз у твоєму секторі... ]",
  "[ Розшифрування древньої мудрості джедаїв... ]",
  "[ Сканування голокрону на наявність підказок... ]",
  "[ Маршрутизація сигналу через безпечні VPN-тунелі... ]"
];

function toggleMenu() {
  const menu = document.getElementById('menuOverlay');
  isMenuOpen = !isMenuOpen;
  menu.classList.toggle('open');
}

function selectCat(el) {
  document.querySelectorAll('.cat-btn').forEach(btn => btn.classList.remove('active'));
  el.classList.add('active');
  selectedCat = el.dataset.cat;
  toggleMenu();
  setTimeout(generateWisdom, 300);
}

// Логіка кліку по тексту
function handleContentClick() {
  if (isTyping) {
    finishTypingInstantly();
  } else {
    toggleTip();
  }
}

function finishTypingInstantly() {
  clearTimeout(typeTimeout);
  isTyping = false;
  document.getElementById('typedText').textContent = currentFullText;
  document.getElementById('typeCursor').style.display = 'none';
  document.getElementById('clickHint').style.opacity = '1';
}

function toggleTip() {
  // Блокуємо відкриття поради, поки йде ефект "підключення" (текст починається з "[")
  if(!currentFullText || isTyping || currentFullText.startsWith('[')) return; 

  const tipBox = document.getElementById('tipBox');
  const hint = document.getElementById('clickHint');
  
  tipBox.classList.toggle('visible');
  
  if(tipBox.classList.contains('visible')) {
    hint.style.opacity = '0';
  } else {
    hint.style.opacity = '1';
  }
}

function typeWriter(text) {
  isTyping = true;
  currentFullText = text;
  
  const textSpan = document.getElementById('typedText');
  const cursorSpan = document.getElementById('typeCursor');
  
  textSpan.textContent = '';
  cursorSpan.style.display = 'inline-block';
  
  let i = 0;
  const baseSpeed = 40; 

  function typeNextChar() {
    if (i < text.length) {
      let char = text.charAt(i);
      textSpan.textContent += char;
      i++;
      
      let currentSpeed = baseSpeed + (Math.random() * 20);
      
      if (['.', ',', '?', '!', '–', '—'].includes(char)) {
        currentSpeed += 250; 
      }
      
      typeTimeout = setTimeout(typeNextChar, currentSpeed);
    } else {
      isTyping = false;
      cursorSpan.style.display = 'none';
      
      // Показуємо підказку кліку тільки якщо це реальна цитата (не "Встановлення зв'язку")
      if(!text.startsWith('[')) {
        document.getElementById('clickHint').style.opacity = '1';
      }
    }
  }
  typeNextChar();
}

function generateWisdom() {
  if(isAnimating) return;
  isAnimating = true;

  // --- ЗВУК ТА АНІМАЦІЯ МЕЧА ---
  igniteSound.currentTime = 0;
  igniteSound.play().catch(e => console.log("Чекаємо кліку користувача для звуку"));
  
  const saber = document.getElementById('lightsaber');
  saber.classList.add('action');

  // Зупиняємо все, що відбувалося до цього
  clearTimeout(typeTimeout);
  isTyping = false;

  const qEl = document.getElementById('quoteText');
  const tBox = document.getElementById('tipBox');
  const hint = document.getElementById('clickHint');
  
  // Ховаємо інтерфейс
  qEl.classList.remove('fade-out'); // Ми не робимо fade-out, бо одразу покажемо текст завантаження
  tBox.classList.remove('visible');
  hint.style.opacity = '0';

  // --- МАГІЯ ШІ: Показуємо статус завантаження ---
  const aiPhrase = connectionPhrases[Math.floor(Math.random() * connectionPhrases.length)];
  document.getElementById('typedText').textContent = aiPhrase;
  document.getElementById('typeCursor').style.display = 'inline-block';
  document.getElementById('typedText').style.color = '#888'; // Робимо текст завантаження тьмянішим
  document.getElementById('typedText').style.fontStyle = 'normal'; // Без курсиву

  // --- ВИБІР ЦИТАТИ З БАЗИ ---
  const pool = selectedCat === 'all' ? QUOTES_DB : QUOTES_DB.filter(i => i.cat === selectedCat);
  let randomIndex;
  if (pool.length > 1) {
    do { randomIndex = Math.floor(Math.random() * pool.length); } 
    while (pool[randomIndex].quote === (QUOTES_DB[lastQuoteIndex] ? QUOTES_DB[lastQuoteIndex].quote : ''));
  } else {
    randomIndex = 0;
  }
  
  const selectedItem = pool[randomIndex];
  lastQuoteIndex = QUOTES_DB.indexOf(selectedItem);

  // Затримка 1.2 секунди (Ефект роздумів ШІ), після якої починаємо друкувати цитату
  setTimeout(() => {
    document.getElementById('tipText').textContent = selectedItem.tip;
    
    // Очищуємо поле та повертаємо стилі цитати
    document.getElementById('typedText').textContent = '';
    document.getElementById('typedText').style.color = 'var(--text)';
    document.getElementById('typedText').style.fontStyle = 'italic';
    
    // Меч знову з'являється
    saber.classList.remove('action');
    
    // Друкуємо мудрість
    typeWriter('\u00ab' + selectedItem.quote + '\u00bb');
    
    setTimeout(() => { isAnimating = false; }, 400);
  }, 1200);
}

// Запуск при завантаженні сторінки
window.addEventListener('load', generateWisdom);
</script>
